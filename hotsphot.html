<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="utf-8">
    <title>تسجيل دخول الشبكة</title>
    <style>
        body { background: #0a0a0a; color: white; text-align: center; font-family: 'Cairo'; }
        .login { background: #1a1a1a; border: 2px solid #00ff88; border-radius: 15px; padding: 30px; margin: 50px auto; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #00ff88; background: #0a0a0a; color: white; }
        button { background: #00ff88; color: #0a0a0a; padding: 10px 30px; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login">
        <h2 style="color:#00ff88;">YOSEF NETWORKS</h2>
        <p>بسم الله الرحمن الرحيم</p>
        <form name="login" action="$(link-login-only)" method="post">
            <input type="hidden" name="dst" value="$(link-orig)" />
            <input name="username" type="text" placeholder="اسم المستخدم" />
            <input name="password" type="password" placeholder="كلمة المرور" />
            <button type="submit">دخول</button>
        </form>
        <p style="font-size:12px; color:#00ff88; margin-top:20px;">لا إله إلا الله محمد رسول الله</p>
        <p>للدعم الفني: 0944833543</p>
    </div>
</body>
</html>
